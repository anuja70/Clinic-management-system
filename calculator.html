<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>

    <style>
        body{
            margin:0;
            padding:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f3f4f6;
            font-family:Arial, sans-serif;
        }

        .calculator{
            width:320px;
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        #screen{
            width:100%;
            height:55px;
            font-size:24px;
            text-align:right;
            padding:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
            background:#f8f8f8;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:10px;
        }

        button{
            padding:15px;
            font-size:18px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        .number{
            background:#e5e7eb;
        }

        .number:hover{
            background:#d1d5db;
        }

        .operator{
            background:#3b82f6;
            color:white;
        }

        .operator:hover{
            background:#2563eb;
        }

        .clear{
            background:#ef4444;
            color:white;
        }

        .clear:hover{
            background:#dc2626;
        }

        .delete{
            background:#f59e0b;
            color:white;
        }

        .delete:hover{
            background:#d97706;
        }

        .equal{
            background:#22c55e;
            color:white;
        }

        .equal:hover{
            background:#16a34a;
        }

        .zero{
            grid-column:span 2;
        }
    </style>

</head>
<body>

<div class="calculator">

    <h1>Simple Calculator</h1>

    <input type="text" id="screen" readonly>

    <div class="buttons">

        <button class="clear" onclick="resetScreen()">C</button>
        <button class="delete" onclick="removeLastCharacter()">⌫</button>
        <button class="operator" onclick="addValue('%')">%</button>
        <button class="operator" onclick="addValue('/')">/</button>

        <button class="number" onclick="addValue('7')">7</button>
        <button class="number" onclick="addValue('8')">8</button>
        <button class="number" onclick="addValue('9')">9</button>
        <button class="operator" onclick="addValue('*')">*</button>

        <button class="number" onclick="addValue('4')">4</button>
        <button class="number" onclick="addValue('5')">5</button>
        <button class="number" onclick="addValue('6')">6</button>
        <button class="operator" onclick="addValue('-')">-</button>

        <button class="number" onclick="addValue('1')">1</button>
        <button class="number" onclick="addValue('2')">2</button>
        <button class="number" onclick="addValue('3')">3</button>
        <button class="operator" onclick="addValue('+')">+</button>

        <button class="number zero" onclick="addValue('0')">0</button>
        <button class="number" onclick="addValue('.')">.</button>
        <button class="equal" onclick="showResult()">=</button>

    </div>

</div>

<script>

    const screen = document.getElementById("screen");

    function addValue(value){
        screen.value += value;
    }

    function resetScreen(){
        screen.value = "";
    }

    function removeLastCharacter(){
        screen.value = screen.value.slice(0,-1);
    }

    function showResult(){
        try{
            screen.value = eval(screen.value);
        }
        catch{
            screen.value = "Error";
        }
    }

</script>

</body>
</html>
